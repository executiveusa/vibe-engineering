name: Nightly Production Readiness Factory

on:
  schedule:
    - cron: "30 7 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-production-readiness
  cancel-in-progress: false

jobs:
  select:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.batch.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - id: batch
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
        run: node scripts/select-nightly-vercel-batch.mjs

  audit-prd-build-review:
    needs: select
    if: ${{ needs.select.outputs.matrix != '' }}
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix: ${{ fromJson(needs.select.outputs.matrix) }}
    runs-on: [self-hosted, linux, x64, vibe-sandcastle]
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          path: control
      - name: Clone target repository
        env:
          GH_TOKEN: ${{ secrets.FLEET_GITHUB_TOKEN }}
        run: gh repo clone "${{ matrix.repository }}" target -- --branch "${{ matrix.branch }}"
      - name: Install factory prompts
        run: |
          mkdir -p target/.vibe-factory
          cp control/factory/*-prompt.md target/.vibe-factory/
          cp control/factory/run-readiness-sandcastle.mts target/.vibe-factory/
      - name: Install Sandcastle runtime
        working-directory: target
        run: npm install --no-save @ai-hero/sandcastle@0.6.4 tsx
      - id: factory
        name: Run audit, PRD, builder, and judge
        working-directory: target
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.FLEET_GITHUB_TOKEN }}
          TARGET_REPOSITORY: ${{ matrix.repository }}
          TARGET_BRANCH: ${{ matrix.branch }}
        run: npx tsx .vibe-factory/run-readiness-sandcastle.mts
      - name: Open pull request from retained branch
        working-directory: target
        env:
          GH_TOKEN: ${{ secrets.FLEET_GITHUB_TOKEN }}
          SANDCASTLE_BRANCH: ${{ steps.factory.outputs.branch }}
        run: |
          test -n "$SANDCASTLE_BRANCH"
          git push --set-upstream origin "$SANDCASTLE_BRANCH:$SANDCASTLE_BRANCH"
          gh pr create --base "${{ matrix.branch }}" --head "$SANDCASTLE_BRANCH" \
            --title "Production readiness: audit, PRD, and bounded execution" \
            --body "Nightly Vibe Engineering run for ${{ matrix.project }}. Includes A2A completion audit, production-readiness PRD, bounded implementation, independent review, Judge evidence, and rollback notes. Merge only when the Judge decision is SHIP and required checks pass."
