$schema: "https://json-schema.org/draft/2020-12/schema"
title: "Phase Directive Schema"
type: "object"
required: ["phase_id", "title", "objective", "consequence_level", "allowed_scope", "prohibited_scope", "acceptance_criteria"]
properties:
  phase_id:
    type: "string"
  title:
    type: "string"
  objective:
    type: "string"
  consequence_level:
    type: "string"
    enum: ["LOW", "MEDIUM", "HIGH"]
  allowed_scope:
    type: "array"
    items:
      type: "string"
  prohibited_scope:
    type: "array"
    items:
      type: "string"
  acceptance_criteria:
    type: "array"
    items:
      type: "string"
